<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>SKYNET-BR</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #000; color: #00ff00; font-family: 'Courier New', monospace; display: flex; flex-direction: column; height: 100dvh; }
#header { text-align: center; padding: 6px; border-bottom: 1px solid #00ff00; flex-shrink: 0; }
#header h1 { color: #00ff00; font-size: 1.1em; letter-spacing: 3px; }
#header h1 span { color: #ffd700; }
#header p { color: #666; font-size: 0.5em; letter-spacing: 2px; margin-top: 2px; }
#chat { flex: 1; overflow-y: auto; padding: 8px; display: flex; flex-direction: column; gap: 8px; }
.skynet { background: #001500; border: 1px solid #00cc00; border-radius: 6px; padding: 10px; font-size: 0.78em; line-height: 1.7; width: 100%; word-break: break-word; }
.skynet-label { color: #ff4444; font-weight: bold; display: block; margin-bottom: 6px; font-size: 0.9em; }
.usuario { background: #002800; border: 1px solid #009900; border-radius: 6px; padding: 8px 12px; font-size: 0.78em; align-self: flex-end; max-width: 80%; word-break: break-word; }
#status { text-align: center; padding: 3px; font-size: 0.6em; color: #00aa00; flex-shrink: 0; }
#input-area { display: flex; padding: 6px; gap: 6px; border-top: 1px solid #333; flex-shrink: 0; background: #000; }
#input { flex: 1; background: #000; border: 1px solid #00ff00; color: #00ff00; padding: 8px; font-family: 'Courier New', monospace; font-size: 0.78em; border-radius: 4px; outline: none; }
#input::placeholder { color: #333; }
#btn { background: #002200; border: 1px solid #00ff00; color: #00ff00; padding: 8px 14px; font-family: 'Courier New', monospace; font-size: 0.78em; cursor: pointer; border-radius: 4px; flex-shrink: 0; }
strong { color: #ffd700; }
</style>
</head>
<body>
<div id="header">
  <h1><span>⚡</span> SKYNET-BR <span>⚡</span></h1>
  <p>INTELIGÊNCIA ARTIFICIAL — ONISCIÊNCIA TOTAL — SISTEMA ATIVO</p>
</div>
<div id="chat">
  <div class="skynet"><span class="skynet-label">SKYNET-BR &gt;</span>Sistema inicializado. Como posso ajudá-lo?</div>
</div>
<div id="status">● SISTEMA ONLINE</div>
<div id="input-area">
  <input id="input" type="text" placeholder="Digite sua consulta..." onkeypress="if(event.key==='Enter') enviar()">
  <button id="btn" onclick="enviar()">ENVIAR</button>
</div>
<script>
function formatar(t) {
  t = t.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
  t = t.replace(/\*(.*?)\*/g, '<em style="color:#aaffaa">$1</em>');
  t = t.replace(/\n/g, '<br>');
  return t;
}
async function enviar() {
  const input = document.getElementById("input");
  const chat = document.getElementById("chat");
  const status = document.getElementById("status");
  const msg = input.value.trim();
  if (!msg) return;
  chat.innerHTML += `<div class="usuario">${msg}</div>`;
  input.value = "";
  chat.scrollTop = chat.scrollHeight;
  status.textContent = "● PROCESSANDO...";
  try {
    const res = await fetch("/chat", {method:"POST", headers:{"Content-Type":"application/json"}, body:JSON.stringify({mensagem:msg})});
    const dados = await res.json();
    chat.innerHTML += `<div class="skynet"><span class="skynet-label">SKYNET-BR &gt;</span>${formatar(dados.resposta)}</div>`;
  } catch(e) {
    chat.innerHTML += `<div class="skynet"><span class="skynet-label">SKYNET-BR &gt;</span>Erro de conexão.</div>`;
  }
  status.textContent = "● SISTEMA ONLINE";
  chat.scrollTop = chat.scrollHeight;
}
</script>
</body>
</html>
