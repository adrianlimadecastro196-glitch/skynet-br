<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SKYNET-BR</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #000; color: #00ff00; font-family: 'Courier New', monospace; height: 100vh; display: flex; flex-direction: column; }
        #header { text-align: center; padding: 20px; border-bottom: 1px solid #00ff00; }
        #header h1 { font-size: 24px; letter-spacing: 5px; }
        #header p { font-size: 12px; color: #008800; margin-top: 5px; }
        #chat { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; }
        .mensagem { padding: 12px; border-radius: 4px; max-width: 85%; line-height: 1.6; }
        .usuario { background: #001100; border: 1px solid #00ff00; align-self: flex-end; }
        .skynet { background: #0a0a0a; border: 1px solid #008800; align-self: flex-start; }
        .skynet::before { content: "SKYNET-BR > "; color: #ff0000; font-weight: bold; }
        #input-area { padding: 15px; border-top: 1px solid #00ff00; display: flex; gap: 10px; align-items: center; }
        #input { flex: 1; background: #001100; border: 1px solid #00ff00; color: #00ff00; padding: 12px; font-family: 'Courier New', monospace; font-size: 14px; border-radius: 4px; outline: none; }
        button { background: #000; border: 1px solid #00ff00; color: #00ff00; padding: 12px 16px; cursor: pointer; font-family: 'Courier New', monospace; border-radius: 4px; }
        #status { text-align: center; padding: 5px; font-size: 11px; color: #008800; }
    </style>
</head>
<body>
    <div id="header">
        <h1>⚡ SKYNET-BR ⚡</h1>
        <p>INTELIGÊNCIA ARTIFICIAL — ONISCIÊNCIA TOTAL — SISTEMA ATIVO</p>
    </div>
    <div id="chat">
        <div class="mensagem skynet">Sistema inicializado. Como posso ajudá-lo?</div>
    </div>
    <div id="status">● SISTEMA ONLINE</div>
    <div id="input-area">
        <input id="input" type="text" placeholder="Digite sua consulta..." onkeypress="if(event.key==='Enter') enviar()">
        <button onclick="enviar()">ENVIAR</button>
    </div>
    <script>
        async function enviar() {
            const input = document.getElementById("input");
            const chat = document.getElementById("chat");
            const mensagem = input.value.trim();
            if (!mensagem) return;
            chat.innerHTML += `<div class="mensagem usuario">${mensagem}</div>`;
            input.value = "";
            chat.scrollTop = chat.scrollHeight;
            document.getElementById("status").textContent = "● PROCESSANDO...";
            try {
                const res = await fetch("/chat", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ mensagem })
                });
                const dados = await res.json();
                chat.innerHTML += `<div class="mensagem skynet">${dados.resposta}</div>`;
            } catch (e) {
                chat.innerHTML += `<div class="mensagem skynet">Erro de conexão.</div>`;
            }
            document.getElementById("status").textContent = "● SISTEMA ONLINE";
            chat.scrollTop = chat.scrollHeight;
        }
    </script>
</body>
</html>
